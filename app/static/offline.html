<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오프라인 · 우리집 자산관리</title>
  <style>
    body { margin: 0; min-height: 100vh; min-height: 100dvh; display: grid; place-items: center;
      background: #262220; color: #F1EDE6; font-family: "SCDream", -apple-system, "Segoe UI",
      "Apple SD Gothic Neo", sans-serif; text-align: center; padding: 24px; }
    .big { font-size: 2.6rem; margin-bottom: 12px; }
    p { color: #A49C90; line-height: 1.6; }
    button { margin-top: 18px; padding: 12px 24px; border-radius: 999px; border: 0;
      background: #9DBE8A; color: #1F1C19; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  </style>
</head>
<body>
  <div>
    <div class="big">📡</div>
    <h1>서버에 연결할 수 없어요</h1>
    <p>집 PC(서버)가 꺼져 있거나 네트워크 연결이 끊겼습니다.<br>
       연결을 확인한 뒤 다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
